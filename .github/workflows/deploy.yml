name: Deploy Staging

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm build
      - name: Health check (staging)
        run: |
          echo "Deploy staging via your orchestrator (K8s / ECS / VM)"
          echo "Post-deploy: curl -f \$STAGING_API_URL/v1/health/ready"

  notify:
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: always()
    steps:
      - run: echo "CI/CD pipeline finished with status ${{ needs.deploy-staging.result }}"
