services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.11
    restart: unless-stopped
    environment:
      MEILI_ENV: production
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:?MEILI_MASTER_KEY is required}
      MEILI_NO_ANALYTICS: "true"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${STORAGE_ACCESS_KEY:?STORAGE_ACCESS_KEY is required}
      MINIO_ROOT_PASSWORD: ${STORAGE_SECRET_KEY:?STORAGE_SECRET_KEY is required}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-bootstrap:
    image: postgres:16-alpine
    restart: "no"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_ADMIN_USER: ${POSTGRES_ADMIN_USER:-}
      POSTGRES_ADMIN_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:-}
      POSTGRES_ADMIN_DB: ${POSTGRES_ADMIN_DB:-postgres}
    volumes:
      - ./docker/postgres/bootstrap.sh:/bootstrap.sh:ro
    command: ["sh", "/bootstrap.sh"]
    depends_on:
      postgres:
        condition: service_healthy

  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
      args:
        APP_NAME: api
    image: ${IMAGE_REGISTRY:-ghcr.io/zhshg}/ai-tool-cms-api:${IMAGE_TAG:-latest}
    restart: "no"
    command: pnpm db:migrate:deploy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    depends_on:
      postgres-bootstrap:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
      args:
        APP_NAME: api
    image: ${IMAGE_REGISTRY:-ghcr.io/zhshg}/ai-tool-cms-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      APP_URL: ${APP_URL}
      ADMIN_URL: ${ADMIN_URL}
      API_URL: ${API_URL}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      QUEUE_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: ${STORAGE_BUCKET}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      STORAGE_REGION: ${STORAGE_REGION}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: ${JWT_ACCESS_EXPIRES_IN}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      CORS_ORIGINS: ${CORS_ORIGINS}
      TRUST_PROXY: ${TRUST_PROXY}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      NEWSLETTER_FROM_EMAIL: ${NEWSLETTER_FROM_EMAIL}
      WEBHOOK_SIGNING_SECRET: ${WEBHOOK_SIGNING_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      AI_DEFAULT_MODEL: ${AI_DEFAULT_MODEL}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      LOG_LEVEL: ${LOG_LEVEL}
      SITE_NAME: ${SITE_NAME}
      SITE_DESCRIPTION: ${SITE_DESCRIPTION}
      DEFAULT_LOCALE: ${DEFAULT_LOCALE}
      ENABLED_LOCALES: ${ENABLED_LOCALES}
      FALLBACK_LOCALE: ${FALLBACK_LOCALE}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      SENTRY_DSN: ${SENTRY_DSN}
      CACHE_DEFAULT_TTL_SECONDS: ${CACHE_DEFAULT_TTL_SECONDS}
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1:4000/v1/health/ready"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
      args:
        APP_NAME: worker
    image: ${IMAGE_REGISTRY:-ghcr.io/zhshg}/ai-tool-cms-worker:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      APP_URL: ${APP_URL}
      API_URL: ${API_URL}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      QUEUE_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: ${STORAGE_BUCKET}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      STORAGE_REGION: ${STORAGE_REGION}
      NEWSLETTER_FROM_EMAIL: ${NEWSLETTER_FROM_EMAIL}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      AI_DEFAULT_MODEL: ${AI_DEFAULT_MODEL}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL}
      CRAWLER_USER_AGENT: ${CRAWLER_USER_AGENT}
      CRAWLER_CONCURRENCY: ${CRAWLER_CONCURRENCY}
      CRAWLER_TIMEOUT_MS: ${CRAWLER_TIMEOUT_MS}
      CRAWLER_ENABLE_PRODUCTION_ADAPTERS: ${CRAWLER_ENABLE_PRODUCTION_ADAPTERS}
      LOG_LEVEL: ${LOG_LEVEL}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      SENTRY_DSN: ${SENTRY_DSN}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3

  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile.node
      args:
        APP_NAME: scheduler
    image: ${IMAGE_REGISTRY:-ghcr.io/zhshg}/ai-tool-cms-scheduler:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      APP_URL: ${APP_URL}
      API_URL: ${API_URL}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      QUEUE_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: ${STORAGE_BUCKET}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      STORAGE_REGION: ${STORAGE_REGION}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      NEWSLETTER_FROM_EMAIL: ${NEWSLETTER_FROM_EMAIL}
      CRAWLER_USER_AGENT: ${CRAWLER_USER_AGENT}
      CRAWLER_CONCURRENCY: ${CRAWLER_CONCURRENCY}
      CRAWLER_TIMEOUT_MS: ${CRAWLER_TIMEOUT_MS}
      CRAWLER_ENABLE_PRODUCTION_ADAPTERS: ${CRAWLER_ENABLE_PRODUCTION_ADAPTERS}
      LOG_LEVEL: ${LOG_LEVEL}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT}
      SENTRY_DSN: ${SENTRY_DSN}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "process.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.next
      args:
        APP_NAME: web
    image: ${IMAGE_REGISTRY:-ghcr.io/zhshg}/ai-tool-cms-web:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_URL: ${APP_URL}
      API_URL: ${API_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      QUEUE_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      SITE_NAME: ${SITE_NAME}
      SITE_DESCRIPTION: ${SITE_DESCRIPTION}
      DEFAULT_LOCALE: ${DEFAULT_LOCALE}
      ENABLED_LOCALES: ${ENABLED_LOCALES}
      FALLBACK_LOCALE: ${FALLBACK_LOCALE}
      NEXT_PUBLIC_ENABLED_LOCALES: ${NEXT_PUBLIC_ENABLED_LOCALES}
      MEILI_URL: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      STORAGE_ENDPOINT: http://minio:9000
      STORAGE_BUCKET: ${STORAGE_BUCKET}
      STORAGE_ACCESS_KEY: ${STORAGE_ACCESS_KEY}
      STORAGE_SECRET_KEY: ${STORAGE_SECRET_KEY}
      STORAGE_REGION: ${STORAGE_REGION}
      NEWSLETTER_FROM_EMAIL: ${NEWSLETTER_FROM_EMAIL}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1:3000"]
      interval: 15s
      timeout: 5s
      retries: 10

  admin:
    build:
      context: .
      dockerfile: docker/Dockerfile.next
      args:
        APP_NAME: admin
        ADMIN_BASE_PATH: /admin
    image: ${IMAGE_REGISTRY:-ghcr.io/zhshg}/ai-tool-cms-admin:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      ADMIN_BASE_PATH: /admin
      APP_URL: ${APP_URL}
      ADMIN_URL: ${ADMIN_URL}
      API_URL: ${API_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://127.0.0.1:3000"]
      interval: 15s
      timeout: 5s
      retries: 10

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
    volumes:
      - ./docker/nginx/conf.d/production.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy
      admin:
        condition: service_healthy
      api:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  minio_data:
